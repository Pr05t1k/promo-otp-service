services:
  postgres:
    image: postgres:17-alpine
    container_name: promo_otp_postgres
    environment:
      POSTGRES_DB: promo_otp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: